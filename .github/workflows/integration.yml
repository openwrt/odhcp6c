name: integration

# DHCPv6/RA integration harness (tools/harness). Runs odhcp6c end-to-end inside a
# netns+veth fabric against a controllable DHCPv6 server + RA sender and asserts
# on the status-script environment. See tools/harness/README.md.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'tools/harness/**'
      - '.github/workflows/integration.yml'
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'tools/harness/**'
      - '.github/workflows/integration.yml'
  schedule:
    # Nightly: the heavier QEMU multi-arch + OpenWrt-rootfs cells.
    - cron: '0 3 * * *'
  workflow_dispatch:

# Least privilege: scenarios only read the checkout and upload artifacts.
permissions:
  contents: read

# Scenarios that run hermetically even where client datagram egress is
# restricted (receive-driven RA scenarios) versus the full set. The per-PR gate
# runs the full set in the container (no egress restriction there).
env:
  SCENARIOS: >-
    stateful-basic
    stateless-info
    renew-rebind
    ra-slaac
    ra-options-edge
    captive-portal
    release-on-stop
    s46-mape
    privsep-signals
    abnormal-exit
    pd-exclude

jobs:
  # ---------------------------------------------------------------------------
  # Per-PR gate: musl (Alpine) + glibc (Debian), amd64.
  # ---------------------------------------------------------------------------
  scenarios:
    name: scenarios (${{ matrix.libc }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        libc:
          - musl
          - glibc
        # Security posture under test. Each cell builds/runs the worker
        # differently:
        #   no-privsep        single-process worker (HARNESS_PRIVSEP=off); no
        #                     libcap-ng drop or seccomp filter is applied.
        #   libcapng          privsep on: monitor/worker split + libcap-ng
        #                     privilege drop, but no seccomp filter.
        #   libcapng-seccomp  privsep on: libcap-ng drop AND the worker
        #                     seccomp-BPF syscall filter (SECCOMP=ON build).
        mode:
          - no-privsep
          - libcapng
          - libcapng-seccomp
        include:
          - libc: musl
            dockerfile: tools/harness/Dockerfile
          - libc: glibc
            dockerfile: tools/harness/Dockerfile.debian
    steps:
      - uses: actions/checkout@v4

      - name: Resolve mode configuration
        id: cfg
        run: |
          set -eu
          # privsep: runtime flag passed to the harness (HARNESS_PRIVSEP).
          # seccomp: build-time CMake option baked into the image.
          case "${{ matrix.mode }}" in
            no-privsep)        privsep=off; seccomp=OFF ;;
            libcapng)          privsep=on;  seccomp=OFF ;;
            libcapng-seccomp)  privsep=on;  seccomp=ON  ;;
            *) echo "::error::unknown mode '${{ matrix.mode }}'"; exit 1 ;;
          esac
          echo "privsep=$privsep" >> "$GITHUB_OUTPUT"
          echo "seccomp=$seccomp" >> "$GITHUB_OUTPUT"

      - name: Build harness image (${{ matrix.libc }}, ${{ matrix.mode }})
        run: |
          docker build -f "${{ matrix.dockerfile }}" \
            --build-arg SECCOMP=${{ steps.cfg.outputs.seccomp }} \
            -t odhcp6c-harness:${{ matrix.libc }}-${{ matrix.mode }} .

      - name: Run scenarios (${{ matrix.libc }}, ${{ matrix.mode }})
        run: |
          set -eu
          mkdir -p artifacts
          rc=0
          # When the worker installs its own seccomp-BPF filter, disable
          # Docker's outer seccomp profile so the in-process filter is the
          # sole confinement under test (mirrors the syscall-trace job). The
          # other modes keep Docker's default profile.
          extra_opts=""
          if [ "${{ steps.cfg.outputs.seccomp }}" = "ON" ]; then
            extra_opts="--security-opt seccomp=unconfined"
          fi
          for s in $SCENARIOS; do
            echo "::group::scenario $s (${{ matrix.libc }}, ${{ matrix.mode }})"
            if docker run --rm --cap-add=NET_ADMIN --cap-add=SYS_ADMIN \
                 --security-opt apparmor=unconfined $extra_opts \
                 -e HARNESS_PRIVSEP=${{ steps.cfg.outputs.privsep }} \
                 -v "$PWD/artifacts:/artifacts" \
                 odhcp6c-harness:${{ matrix.libc }}-${{ matrix.mode }} \
                 tools/harness/run-scenario.sh --timeout 30 \
                 --outdir "/artifacts/$s" "$s"; then
              echo "PASS: $s"
            else
              echo "::error::scenario failed: $s (${{ matrix.libc }}, ${{ matrix.mode }})"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

      - name: Upload artifacts (records + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenarios-${{ matrix.libc }}-${{ matrix.mode }}
          path: artifacts/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Trace mode: run every scenario under strace (seccomp unconfined) and
  # reconcile the syscalls the privsep WORKER actually issues against the
  # checked-in allow-list (src/seccomp.c). This is the diagnostic that tells us
  # exactly which syscalls / ioctl commands are missing when a libcapng-seccomp
  # cell fails -- the report is printed to the job summary and uploaded.
  # ---------------------------------------------------------------------------
  trace:
    name: syscall trace + seccomp reconcile (${{ matrix.libc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        libc:
          - musl
          - glibc
        include:
          - libc: musl
            dockerfile: tools/harness/Dockerfile
          - libc: glibc
            dockerfile: tools/harness/Dockerfile.debian
    steps:
      - uses: actions/checkout@v4

      - name: Build harness image (${{ matrix.libc }})
        run: docker build -f "${{ matrix.dockerfile }}" -t odhcp6c-harness:${{ matrix.libc }} .

      - name: Capture syscalls across all scenarios (strace, privsep)
        run: |
          set -eu
          mkdir -p trace-artifacts
          # privsep is left at its default (on) so a distinct worker exists to
          # isolate. seccomp=unconfined so strace sees the real syscalls the
          # worker would issue (the build itself has seccomp off here).
          for s in $SCENARIOS; do
            echo "::group::strace $s (${{ matrix.libc }})"
            docker run --rm \
              --cap-add=NET_ADMIN --cap-add=SYS_ADMIN --cap-add=SYS_PTRACE \
              --security-opt seccomp=unconfined --security-opt apparmor=unconfined \
              -v "$PWD/trace-artifacts:/artifacts" \
              odhcp6c-harness:${{ matrix.libc }} \
              tools/harness/run-scenario.sh --trace=strace --timeout 30 \
              --outdir "/artifacts/$s" "$s" \
              || echo "::warning::strace scenario $s exited non-zero (continuing; trace still captured)"
            echo "::endgroup::"
          done

      - name: Reconcile worker syscalls against the seccomp allow-list
        run: |
          set -eu
          report="trace-artifacts/seccomp-reconcile.${{ matrix.libc }}.txt"
          # Diagnostic only: never fail the job (no --strict), just publish the
          # gap so it can be acted on alongside the libcapng-seccomp cells.
          tools/harness/seccomp-syscall-report.sh src/seccomp.c trace-artifacts/* \
            | tee "$report"
          {
            echo "### seccomp reconciliation (${{ matrix.libc }})";
            echo '```';
            cat "$report";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload syscall lists + reconciliation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: syscalls-strace-${{ matrix.libc }}
          path: |
            trace-artifacts/**/trace/syscalls.*.txt
            trace-artifacts/seccomp-reconcile.*.txt
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Nightly / dispatch: QEMU-emulated architectures + OpenWrt rootfs (the
  # authoritative musl environment for the N-2 syscall list).
  # ---------------------------------------------------------------------------
  multiarch:
    name: scenarios (qemu ${{ matrix.platform }}, privsep ${{ matrix.privsep }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/arm/v7
          - linux/arm64
          - linux/386
        privsep:
          - 'on'
          - 'off'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build harness image (${{ matrix.platform }})
        run: |
          docker buildx build --platform "${{ matrix.platform }}" \
            -f tools/harness/Dockerfile -t odhcp6c-harness:qemu --load .

      - name: Run scenarios (${{ matrix.platform }}, privsep ${{ matrix.privsep }})
        run: |
          set -eu
          mkdir -p artifacts
          rc=0
          for s in $SCENARIOS; do
            echo "::group::scenario $s (${{ matrix.platform }}, privsep ${{ matrix.privsep }})"
            if docker run --rm --platform "${{ matrix.platform }}" \
                 --cap-add=NET_ADMIN --cap-add=SYS_ADMIN \
                 --security-opt apparmor=unconfined \
                 -e HARNESS_PRIVSEP=${{ matrix.privsep }} \
                 -v "$PWD/artifacts:/artifacts" \
                 odhcp6c-harness:qemu \
                 tools/harness/run-scenario.sh --timeout 60 \
                 --outdir "/artifacts/$s" "$s"; then
              echo "PASS: $s"
            else
              echo "::error::scenario failed: $s (${{ matrix.platform }}, privsep ${{ matrix.privsep }})"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenarios-qemu-${{ strategy.job-index }}
          path: artifacts/
          if-no-files-found: ignore

  # OpenWrt x86-64 rootfs cell: the authoritative musl environment. Imported via
  # `docker import` of the published rootfs.tar.gz. Kept non-blocking until the
  # rootfs URL is pinned for the target OpenWrt release.
  openwrt-rootfs:
    name: scenarios (openwrt rootfs)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Import OpenWrt x86-64 rootfs
        run: |
          set -eu
          # Pin to the desired OpenWrt release rootfs. Example (x86-64 generic):
          URL="https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-23.05.3-x86-64-generic-rootfs.tar.gz"
          curl -fsSL -o rootfs.tar.gz "$URL"
          docker import rootfs.tar.gz openwrt-rootfs:latest

      - name: Build + run scenarios in OpenWrt rootfs
        run: |
          set -eu
          # OpenWrt ships odhcp6c; build the binary-under-test and run the
          # harness using the rootfs as the base image.
          docker build -f tools/harness/Dockerfile.openwrt -t odhcp6c-harness:openwrt . \
            || { echo "OpenWrt harness image not yet provisioned; see README"; exit 1; }
          mkdir -p artifacts
          rc=0
          for s in $SCENARIOS; do
            docker run --rm --cap-add=NET_ADMIN --cap-add=SYS_ADMIN \
              --security-opt apparmor=unconfined \
              -v "$PWD/artifacts:/artifacts" \
              odhcp6c-harness:openwrt \
              tools/harness/run-scenario.sh --timeout 60 \
              --outdir "/artifacts/$s" "$s" || rc=1
          done
          exit $rc

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenarios-openwrt
          path: artifacts/
          if-no-files-found: ignore
